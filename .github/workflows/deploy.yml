name: 🚀 Deploy para Hostinger via FTP

on:
  push:
    branches:
      - main # (ou master, dependendo de como está a sua branch principal)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚚 Checkout do código
        uses: actions/checkout@v4

      - name: ⚙️ Setup do Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Versão LTS recomendada

      - name: 📦 Instalar dependências
        run: npm install

      - name: 🛠️ Build do projeto (Vite)
        run: npm run build

      - name: 🛸 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./domains/franciscooliveira.space/public_html/
          dangerous-clean-slate: false # Impede que ele apague arquivos aleatórios do servidor